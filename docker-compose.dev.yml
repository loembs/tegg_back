# ============================================
# Platforme Tegg - Docker Compose Development
# ============================================

version: '3.8'

services:
  # PostgreSQL Database for Development
  postgres:
    image: postgres:16-alpine
    container_name: tegg-postgres-dev
    environment:
      POSTGRES_DB: tegg_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tegg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tegg-dev-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  tegg-dev-network:
    driver: bridge
