# ============================================
# Platforme Tegg - Docker Compose
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tegg-postgres
    environment:
      POSTGRES_DB: tegg_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tegg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tegg-network

  # Backend Spring Boot
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tegg-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_NAME: tegg_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: TeggSecretKeyForJWTTokenGeneration2024MustBeLongEnough
      JWT_EXPIRATION_MS: 86400000
      CORS_ORIGINS: "*"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tegg-network
    restart: unless-stopped

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tegg-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tegg.sn
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tegg-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  tegg-network:
    driver: bridge
