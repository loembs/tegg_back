spring:
  application:
    name: platforme-tegg

  datasource:
    url: jdbc:postgresql://localhost:5432/tegg_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
jwt:
  secret: TeggSecretKeyForJWTTokenGeneration2024MustBeLongEnough
  expiration-ms: 86400000

# Logging
logging:
  level:
    sn.tegg.platforme: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
