spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DATABASE_USER:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=false

# JWT Configuration
jwt.secret=${JWT_SECRET:TeggSecretKeyForJWTTokenGeneration2024MustBeLongEnough}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Afficher toutes les requêtes SQL et erreurs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core=DEBUG

# Logging pour debug
logging.level.org.hibernate=DEBUG
logging.level.org.springframework=INFO



